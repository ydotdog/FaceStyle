name: FaceStyle
options:
  bundleIdPrefix: com.kyleqi
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.2"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  defaultConfig: Release

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  FaceStyle:
    type: application
    platform: iOS
    sources:
      - path: FaceStyle
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: FaceStyle/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.kyleqi.FaceStyle
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: "NO"
        SWIFT_EMIT_LOC_STRINGS: "YES"
    dependencies: []
    preBuildScripts: []
